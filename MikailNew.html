<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #BF40BF;
        color: #000;
    }

    /* HEADER */
    header {
        background: #000;
        color: #fff;
        padding: 15px 0;
        text-align: center;
        border-bottom: 4px solid #800020;
    }

    header h1 {
        margin: 0;
    }

    nav {
        margin-top: 10px;
    }

    nav a {
        color: #fff;
        margin: 0 15px;
        text-decoration: none;
        font-weight: bold;
    }

    nav a:hover {
        color: #800020;
    }

    /* SECTIONS */
    section {
        display: none;
        padding: 40px;
        text-align: center;
    }

    section.active {
        display: block;
    }

    h2 {
        color: #800020;
    }

    /* GALLERY */
    .gallery { 
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-top: 20px;
    }

    .gallery img {
        width: 100%;
        border: 3px solid #000;
    }

     <h2>My Gallery</h2>

    <div class="gallery">
        <img src="image1.jpg" alt="Picture 1">
        <img src="image2.jpg" alt="Picture 2">
        <img src="image3.jpg" alt="Picture 3">
        <img src="image4.jpg" alt="Picture 4">
    </div>


    /* VIDEO */
    .video-container { song with cool rap vibes
        margin-top: 20px;
    }

    iframe {
        width: 80%;
        height: 400px;
        border: 3px solid #000;
    }

    /* FOOTER */
    footer {
        background: #000;
        color: #fff;
        text-align: center;
        padding: 10px;
        border-top: 4px solid #800020;
    }
</style>
</head>

<script>
function showSection(sectionId) {
    const sections = document.querySelectorAll("section");
    sections.forEach(section => {
        section.classList.remove("active");
    });

    document.getElementById(sectionId).classList.add("active");
}
</script>
