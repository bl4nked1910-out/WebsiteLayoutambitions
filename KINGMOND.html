<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY AMBITION</title>

<style>
:root {
  --bg: #0f0f14;
  --accent: #ff8ad6;
  --accent2: #8affc1;
  --text: #f5f5f5;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  scroll-behavior: smooth;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  background: rgba(15,15,20,0.7);
  backdrop-filter: blur(10px);
}

nav a {
  color: var(--text);
  text-decoration: none;
  margin-left: 20px;
  font-size: 0.9rem;
}

nav a:hover {
  color: var(--accent);
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
}

.hero h1 {
  font-family: 'RocknRoll One', sans-serif;
  font-size: 3rem;
  color: var(--accent);
}

.hero p {
  margin-top: 10px;
  font-size: 1rem;
  opacity: 0.8;
}

.btn {
  margin-top: 25px;
  padding: 10px 20px;
  border: 1px solid var(--accent);
  color: var(--accent);
  text-decoration: none;
  border-radius: 20px;
  transition: 0.3s;
}

.btn:hover {
  background: var(--accent);
  color: #000;
}

/* ABOUT */
.section {
  padding: 80px 40px;
  max-width: 900px;
  margin: auto;
}

.section h2 {
  font-size: 1.5rem;
  margin-bottom: 20px;
  color: var(--accent2);
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 12px;
  transition: 0.3s;
  filter: grayscale(40%);
}

.gallery img:hover {
  transform: scale(1.05);
  filter: grayscale(0%);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  font-size: 0.8rem;
  opacity: 0.6;
}

.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  position: relative;
  overflow: hidden;
}

/* PARALLAX LAYERS */
.hero::before {
  content: "";
  position: absolute;
  width: 120%;
  height: 120%;
  top: -10%;
  left: -10%;
  background: url('https://picsum.photos/1200/800?blur=2') center/cover no-repeat;
  transform: translateY(0);
  z-index: -2;
  opacity: 0.25;
}

.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 30% 30%, #ff8ad680, transparent),
              radial-gradient(circle at 70% 70%, #8affc180, transparent);
  z-index: -1;
}
</style>
</head>

<body>

<nav>
  <div>★ myspace</div>
  <div>
    <a href="#about">about</a>
    <a href="#gallery">gallery</a>
  </div>
</nav>

  <h1>hi, i'm Noelle ✦</h1>

  <a href="#gallery" class="btn">see my work</a>
