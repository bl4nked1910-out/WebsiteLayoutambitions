<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Website Layout</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      color:#333;
    }

    /* Header */
    header{
      background:#222;
      color:white;
      padding:20px;
      text-align:center;
    }

    /* Navigation */
    nav{
      background:#444;
      padding:10px;
    }

    nav ul{
      display:flex;
      justify-content:center;
      list-style:none;
      gap:20px;
    }

    nav a{
      color:white;
      text-decoration:none;
      font-weight:bold;
    }

    nav a:hover{
      color:#66ff00;
    }

    /* Hero Section */
    .hero{
      height:300px;
      background:linear-gradient(to right, #003b2f, #00aab3);
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      text-align:center;
      padding:20px;
    }

    .hero h1{
      font-size:48px;
      margin-bottom:10px;
    }

    /* Main Content */
    .container{
      display:flex;
      gap:20px;
      padding:20px;
    }

    main{
      flex:3;
      background:white;
      padding:20px;
      border-radius:8px;
    }

    aside{
      flex:1;
      background:white;
      padding:20px;
      border-radius:8px;
    }

    /* Cards */
    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
      gap:20px;
      margin-top:20px;
    }

    .card{
      background:#fafafa;
      padding:20px;
      border-radius:8px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    /* Footer */
    footer{
      background:#222;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:20px;
    }

    /* Responsive */
    @media(max-width:768px){
      .container{
        flex-direction:column;
      }

      nav ul{
        flex-direction:column;
        align-items:center;
      }

      .hero h1{
        font-size:32px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>My Website</h1>
    <p>Simple HTML & CSS Layout</p>
  </header>

  <!-- Navigation -->
  <nav>
    <ul>
      <li><a href="#">About Me</a></li>
      <li><a href="#">Ambition</a></li>
      <li><a href="#">The Reason</a></li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div>
      <h1>HI! I'm Hafiz</h1>
      <p>This is a simple explanation about me.</p>
    </div>
  </section>

  <!-- Content -->
  <div class="container">

    <!-- Main -->
    <main>
      <h2>Main Content</h2>
      <p>
        This is a simple responsive website layout example.
      </p>
    </main>

    <!-- Sidebar -->
    <aside>
      <h2>Sidebar</h2>
      <p>
        Add links, ads, profile info, or widgets here.
      </p>
    </aside>

  </div>

  <!-- Footer -->
  <footer>
    <p>© 2026 My Website. All rights reserved.</p>
  </footer>

</body>
</html>
